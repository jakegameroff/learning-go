<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notepad</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #111;
            color: #e0e0e0;
            font-family: -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            padding: 60px 20px;
            height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 120px);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        h1 { font-size: 1.4rem; font-weight: 500; }
        .status {
            font-size: 0.8rem;
            color: #555;
        }
        .status.connected { color: #4a9; }
        .room {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 16px;
        }
        .editor-wrapper {
            flex: 1;
            position: relative;
        }
        textarea {
            width: 100%;
            height: 100%;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #e0e0e0;
            padding: 16px;
            border-radius: 6px;
            font-family: -apple-system, sans-serif;
            font-size: 0.95rem;
            outline: none;
            resize: none;
            line-height: 1.6;
        }
        textarea:focus { border-color: #555; }
        .cursor-label {
            position: absolute;
            pointer-events: none;
            font-size: 0.7rem;
            padding: 1px 4px;
            border-radius: 3px;
            white-space: nowrap;
            transform: translateY(-100%);
            z-index: 10;
        }
        .cursor-line {
            position: absolute;
            width: 2px;
            height: 1.6em;
            pointer-events: none;
            z-index: 10;
        }
        .users {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 8px;
            min-height: 1.2em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Notepad</h1>
            <div class="status" id="status">Disconnected</div>
        </div>
        <div class="room" id="room"></div>
        <div class="users" id="users"></div>
        <div class="editor-wrapper">
            <textarea id="editor" placeholder="Start typing..."></textarea>
            <div id="cursors"></div>
        </div>
    </div>
    <script type="module">
        import * as Y from 'https://cdn.jsdelivr.net/npm/yjs@13/+esm';

        const roomName = window.location.pathname;
        document.getElementById("room").textContent = roomName;

        const ydoc = new Y.Doc();
        const ytext = ydoc.getText("shared");
        const editor = document.getElementById("editor");
        const cursorsDiv = document.getElementById("cursors");
        let ws;
        let suppressUpdate = false;

        const colors = ["#ff6b9d", "#51cf66", "#fcc419", "#cc5de8", "#ff922b", "#22b8cf", "#ff6b6b", "#4a9eff"];
        const remoteCursors = {};

        function getColorForUser(userID) {
            let hash = 0;
            for (let i = 0; i < userID.length; i++) {
                hash = ((hash << 5) - hash) + userID.charCodeAt(i);
            }
            return colors[Math.abs(hash) % colors.length];
        }

        // mirror div for accurate cursor positioning
        const mirror = document.createElement("div");
        mirror.style.cssText = `
            position: absolute; visibility: hidden; white-space: pre-wrap;
            word-wrap: break-word; overflow: hidden;
        `;
        document.body.appendChild(mirror);

        function getCursorCoords(position) {
            const style = getComputedStyle(editor);
            mirror.style.font = style.font;
            mirror.style.padding = style.padding;
            mirror.style.border = style.border;
            mirror.style.width = style.width;
            mirror.style.letterSpacing = style.letterSpacing;

            const text = editor.value.substring(0, position);
            mirror.textContent = text;

            const marker = document.createElement("span");
            marker.textContent = "|";
            mirror.appendChild(marker);

            const editorRect = editor.getBoundingClientRect();
            const markerRect = marker.getBoundingClientRect();
            const mirrorRect = mirror.getBoundingClientRect();

            const x = markerRect.left - mirrorRect.left;
            const y = markerRect.top - mirrorRect.top - editor.scrollTop;

            return { x, y };
        }

        function renderCursors() {
            cursorsDiv.innerHTML = "";
            for (const [userID, info] of Object.entries(remoteCursors)) {
                const coords = getCursorCoords(info.position);
                const color = getColorForUser(userID);

                const line = document.createElement("div");
                line.className = "cursor-line";
                line.style.left = coords.x + "px";
                line.style.top = coords.y + "px";
                line.style.backgroundColor = color;
                cursorsDiv.appendChild(line);

                const label = document.createElement("div");
                label.className = "cursor-label";
                label.style.left = coords.x + "px";
                label.style.top = coords.y + "px";
                label.style.backgroundColor = color;
                label.style.color = "#111";
                label.textContent = info.name;
                cursorsDiv.appendChild(label);
            }
        }

        // send cursor position on selection change
        editor.addEventListener("keyup", sendCursor);
        editor.addEventListener("click", sendCursor);

        function sendCursor() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ position: editor.selectionStart }));
            }
        }

        ydoc.on("update", (update) => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(update);
            }
        });

        ytext.observe(() => {
            if (!suppressUpdate) {
                const pos = editor.selectionStart;
                editor.value = ytext.toString();
                editor.selectionStart = pos;
                editor.selectionEnd = pos;
            }
        });

        editor.addEventListener("input", () => {
            suppressUpdate = true;
            const val = editor.value;
            ydoc.transact(() => {
                ytext.delete(0, ytext.length);
                ytext.insert(0, val);
            });
            suppressUpdate = false;
            sendCursor();
        });

        editor.addEventListener("scroll", renderCursors);

        function connect() {
            const host = window.location.host;
            ws = new WebSocket(`ws://${host}${roomName}`);
            ws.binaryType = "arraybuffer";

            ws.onopen = () => {
                document.getElementById("status").textContent = "Connected";
                document.getElementById("status").className = "status connected";
            };

            ws.onclose = () => {
                document.getElementById("status").textContent = "Disconnected";
                document.getElementById("status").className = "status";
                setTimeout(connect, 2000);
            };

            ws.onmessage = (e) => {
                if (typeof e.data === "string") {
                    // text message = cursor update
                    const msg = JSON.parse(e.data);
                    if (msg.UserID && msg.Position !== undefined) {
                        if (msg.Position === -1) {
                            delete remoteCursors[msg.UserID];
                        } else {
                            remoteCursors[msg.UserID] = {
                                position: msg.Position,
                                name: msg.Name || msg.UserID
                            };
                        }
                        renderCursors();
                    }
                } else {
                    // binary message = Yjs update
                    const data = new Uint8Array(e.data);
                    Y.applyUpdate(ydoc, data);
                }
            };
        }

        connect();
    </script>
</body>
</html>
