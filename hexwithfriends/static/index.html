<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>hex</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><polygon points='50,2 93,27 93,73 50,98 7,73 7,27' fill='%234a9'/></svg>">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, sans-serif;
            margin: 0;
            padding: 24px 16px;
            color: #333;
            background: #fafaf8;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100dvh;
        }
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 10px 14px;
            font-size: 0.8rem;
            color: #888;
            z-index: 10;
            pointer-events: none;
        }
        .top-bar > * { pointer-events: auto; }
        .title {
            cursor: pointer;
            font-size: 0.8rem;
        }
        .title b { font-family: monospace; }
        .top-right {
            text-align: right;
        }
        .status { font-size: 0.75rem; color: #aaa; }
        .status.connected { color: #6b9; }
        .player-name { font-weight: 600; color: #555; }
        .red { color: #e25555; }
        .blue { color: #4488cc; }
        .turn-indicator {
            font-size: 0.95rem;
            margin-bottom: 8px;
            text-align: center;
            letter-spacing: 0.02em;
        }
        .winner-banner {
            font-size: 1.3rem;
            font-weight: 600;
            text-align: center;
            padding: 12px 20px;
            margin-bottom: 12px;
            border-radius: 8px;
            background: #fff;
            box-shadow: 0 1px 6px rgba(0,0,0,0.08);
        }
        .board-wrap {
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
            width: 100%;
            padding: 0;
        }
        #board {
            width: 100%;
            max-width: 700px;
            height: auto;
            touch-action: manipulation;
        }
        .hex-cell {
            cursor: pointer;
            transition: fill 0.15s ease, transform 0.15s ease;
        }
        .hex-cell.empty { fill: #e4e0d8; }
        .hex-cell.empty:hover { fill: #d5d0c6; }
        .hex-cell.red { fill: #e25555; cursor: default; }
        .hex-cell.blue { fill: #4488cc; cursor: default; }
        .hex-cell.placed {
            animation: plop 0.25s ease-out;
        }
        @keyframes plop {
            0% { opacity: 0.4; }
            100% { opacity: 1; }
        }
        .hex-cell.win-pulse {
            animation: pulse 0.6s ease-in-out 3;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .hex-cell.fade-out {
            transition: opacity 0.8s ease;
            opacity: 0;
        }
        .winner-banner {
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(-10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) and (orientation: portrait) {
            .board-wrap {
                width: calc(100vh - 80px);
                height: calc(100vw - 80px);
                transform: rotate(90deg);
                transform-origin: center center;
                margin: 40px;
            }
        }

        @media (prefers-color-scheme: dark) {
            body { background: #151514; color: #ddd; }
            .top-bar { color: #666; }
            .player-name { color: #bbb; }
            .winner-banner { background: #222; box-shadow: 0 1px 6px rgba(0,0,0,0.3); }
            .hex-cell.empty { fill: #2a2926; }
            .hex-cell.empty:hover { fill: #3a3835; }
            .hex-cell.red { fill: #cc4444; }
            .hex-cell.blue { fill: #3377aa; }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <span class="title" onclick="navigator.clipboard.writeText(window.location.href).then(()=>{this.style.color='#6b9';setTimeout(()=>this.style.color='',400)})">
            <b id="room-name"></b>
        </span>
        <div class="top-right">
            <span id="player-name" class="player-name"></span>
            <span id="player-color"></span><br>
            <span id="status" class="status">Connecting...</span>
        </div>
    </div>
    <div id="waiting" class="turn-indicator" style="color:#aaa;">Waiting for opponent...</div>
    <div id="turn" class="turn-indicator" style="display:none;"></div>
    <div id="winner" class="winner-banner" style="display:none;"></div>
    <div class="board-wrap">
        <svg id="board"></svg>
    </div>

    <script>
        const SIZE = 11;
        const roomName = window.location.pathname;
        document.getElementById("room-name").textContent = "hexwithfriends.com" + roomName;

        let playerName = "";
        let myColor = null;
        let sessionID = null;
        let currentTurn = "red";
        let gameStarted = false;
        let gameOver = false;
        let ws;

        // Hex geometry — pointy-top hexagons
        const HEX_R = 28;
        const HEX_W = HEX_R * Math.sqrt(3);
        const HEX_H = HEX_R * 2;
        const GAP = 4;
        const ns = "http://www.w3.org/2000/svg";

        function hexCorner(cx, cy, r, i) {
            const angle = Math.PI / 6 + i * Math.PI / 3;
            return [cx + r * Math.cos(angle), cy + r * Math.sin(angle)];
        }

        function hexPoints(cx, cy, r) {
            return Array.from({length: 6}, (_, i) => hexCorner(cx, cy, r || HEX_R, i).map(v => v.toFixed(2)).join(",")).join(" ");
        }

        function cellCenter(r, c) {
            const colStep = HEX_W + GAP;
            const rowStep = HEX_H * 0.75 + GAP;
            const rowShift = colStep / 2;
            const cx = r * rowShift + c * colStep + HEX_W / 2;
            const cy = r * rowStep + HEX_R;
            return [cx, cy];
        }

        function buildBoard() {
            const svg = document.getElementById("board");

            const colStep = HEX_W + GAP;
            const rowStep = HEX_H * 0.75 + GAP;
            const rowShift = colStep / 2;
            const pad = 40;

            const totalW = (SIZE - 1) * colStep + HEX_W + (SIZE - 1) * rowShift + pad * 2;
            const totalH = (SIZE - 1) * rowStep + HEX_H + pad * 2;
            svg.setAttribute("viewBox", (-pad) + " " + (-pad) + " " + totalW + " " + totalH);

            // Corner indices for pointy-top hex (angle = π/6 + i*π/3):
            // 0: bottom-right, 1: bottom, 2: bottom-left
            // 3: top-left, 4: top, 5: top-right

            function drawEdge(p1, p2, color) {
                const line = document.createElementNS(ns, "line");
                line.setAttribute("x1", p1[0].toFixed(2));
                line.setAttribute("y1", p1[1].toFixed(2));
                line.setAttribute("x2", p2[0].toFixed(2));
                line.setAttribute("y2", p2[1].toFixed(2));
                line.setAttribute("stroke", color);
                line.setAttribute("stroke-width", 2.5);
                line.setAttribute("stroke-linecap", "round");
                svg.appendChild(line);
            }

            // Draw order: bottom-red, right-blue, top-red, left-blue

            // Bottom border (red)
            for (let c = 0; c < SIZE; c++) {
                const [cx, cy] = cellCenter(SIZE - 1, c);
                drawEdge(hexCorner(cx, cy, HEX_R, 2), hexCorner(cx, cy, HEX_R, 1), "#e25555");
                drawEdge(hexCorner(cx, cy, HEX_R, 1), hexCorner(cx, cy, HEX_R, 0), "#e25555");
                if (c < SIZE - 1) {
                    const [nx, ny] = cellCenter(SIZE - 1, c + 1);
                    drawEdge(hexCorner(cx, cy, HEX_R, 0), hexCorner(nx, ny, HEX_R, 2), "#e25555");
                }
            }

            // Right border (blue)
            for (let r = 0; r < SIZE; r++) {
                const [cx, cy] = cellCenter(r, SIZE - 1);
                drawEdge(hexCorner(cx, cy, HEX_R, 4), hexCorner(cx, cy, HEX_R, 5), "#4488cc");
                drawEdge(hexCorner(cx, cy, HEX_R, 5), hexCorner(cx, cy, HEX_R, 0), "#4488cc");
                if (r < SIZE - 1) {
                    const [nx, ny] = cellCenter(r + 1, SIZE - 1);
                    drawEdge(hexCorner(cx, cy, HEX_R, 0), hexCorner(nx, ny, HEX_R, 4), "#4488cc");
                }
            }

            // Top border (red)
            for (let c = 0; c < SIZE; c++) {
                const [cx, cy] = cellCenter(0, c);
                drawEdge(hexCorner(cx, cy, HEX_R, 3), hexCorner(cx, cy, HEX_R, 4), "#e25555");
                drawEdge(hexCorner(cx, cy, HEX_R, 4), hexCorner(cx, cy, HEX_R, 5), "#e25555");
                if (c < SIZE - 1) {
                    const [nx, ny] = cellCenter(0, c + 1);
                    drawEdge(hexCorner(cx, cy, HEX_R, 5), hexCorner(nx, ny, HEX_R, 3), "#e25555");
                }
            }

            // Left border (blue)
            for (let r = 0; r < SIZE; r++) {
                const [cx, cy] = cellCenter(r, 0);
                drawEdge(hexCorner(cx, cy, HEX_R, 3), hexCorner(cx, cy, HEX_R, 2), "#4488cc");
                drawEdge(hexCorner(cx, cy, HEX_R, 2), hexCorner(cx, cy, HEX_R, 1), "#4488cc");
                if (r < SIZE - 1) {
                    const [nx, ny] = cellCenter(r + 1, 0);
                    drawEdge(hexCorner(cx, cy, HEX_R, 1), hexCorner(nx, ny, HEX_R, 3), "#4488cc");
                }
            }

            // Draw hex cells
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const [cx, cy] = cellCenter(r, c);

                    const hex = document.createElementNS(ns, "polygon");
                    hex.setAttribute("points", hexPoints(cx, cy));
                    hex.setAttribute("class", "hex-cell empty");
                    hex.setAttribute("data-index", r * SIZE + c);
                    hex.addEventListener("click", () => onCellClick(r, c, hex));
                    svg.appendChild(hex);
                }
            }
        }

        function onCellClick(r, c, cell) {
            if (!gameStarted || gameOver) return;
            if (cell.classList.contains("red") || cell.classList.contains("blue")) return;
            if (myColor !== currentTurn) return;
            if (!ws || ws.readyState !== WebSocket.OPEN) return;

            const index = r * SIZE + c;
            const msg = JSON.stringify({ index: index });
            ws.send(msg);
        }

        function updateTurn() {
            const el = document.getElementById("turn");
            if (gameOver) {
                el.style.display = "none";
                return;
            }
            const color = currentTurn === "red" ? "#e25555" : "#4488cc";
            el.innerHTML = '<span style="color:' + color + '">' + currentTurn + '</span> to move';
        }

        function connect() {
            const host = window.location.host;
            const proto = window.location.protocol === "https:" ? "wss:" : "ws:";
            let url = proto + "//" + host + roomName;
            if (sessionID) url += "?session=" + sessionID;
            ws = new WebSocket(url);

            ws.onopen = () => {
                document.getElementById("status").textContent = "Connected";
                document.getElementById("status").className = "status connected";
            };

            ws.onclose = () => {
                document.getElementById("status").textContent = "Disconnected";
                document.getElementById("status").className = "status";
                if (!gameOver) setTimeout(connect, 2000);
            };

            ws.onmessage = (e) => {
                const msg = JSON.parse(e.data);

                if (msg.playerName) {
                    playerName = msg.playerName;
                    document.getElementById("player-name").textContent = playerName;
                    return;
                }

                if (msg.index !== undefined && msg.color) {
                    if (!gameStarted) return;
                    const cell = document.querySelector('[data-index="' + msg.index + '"]');
                    if (cell) {
                        cell.classList.remove("empty");
                        cell.classList.add(msg.color, "placed");
                    }
                    currentTurn = msg.color === "red" ? "blue" : "red";
                    updateTurn();
                    return;
                }

                if (msg.reset) {
                    const newColor = msg.color;

                    // wait for win animation to finish, then fade out and reset
                    setTimeout(() => {
                        // update color for next game
                        if (newColor) {
                            myColor = newColor;
                            const el = document.getElementById("player-color");
                            const cls = myColor === "red" ? "red" : "blue";
                            el.innerHTML = '&middot; <span class="' + cls + '">' + myColor + '</span>';
                        }

                        // fade out all cells
                        document.querySelectorAll(".hex-cell").forEach(c => {
                            c.classList.add("fade-out");
                        });

                        setTimeout(() => {
                            gameOver = false;
                            gameStarted = true;
                            currentTurn = "red";
                            document.getElementById("winner").style.display = "none";
                            document.getElementById("turn").style.display = "";
                            document.querySelectorAll(".hex-cell").forEach(c => {
                                c.classList.remove("red", "blue", "placed", "win-pulse", "fade-out");
                                c.classList.add("empty");
                                c.style.opacity = "";
                            });
                            updateTurn();
                        }, 1000);
                    }, 3000);
                    return;
                }

                if (msg.color) {
                    myColor = msg.color;
                    const el = document.getElementById("player-color");
                    const cls = myColor === "red" ? "red" : "blue";
                    el.innerHTML = '&middot; <span class="' + cls + '">' + myColor + '</span>';
                    return;
                }

                if (msg.start) {
                    gameStarted = true;
                    if (msg.sessionID) {
                        sessionID = msg.sessionID;
                        localStorage.setItem("hex_session_" + roomName, sessionID);
                    }
                    if (msg.color) {
                        myColor = msg.color;
                        const el = document.getElementById("player-color");
                        const cls = myColor === "red" ? "red" : "blue";
                        el.innerHTML = '&middot; <span class="' + cls + '">' + myColor + '</span>';
                    }
                    if (msg.playerName) {
                        playerName = msg.playerName;
                        document.getElementById("player-name").textContent = playerName;
                    }
                    document.getElementById("waiting").style.display = "none";
                    document.getElementById("turn").style.display = "";
                    updateTurn();
                    return;
                }

                if (msg.reconnected) {
                    myColor = msg.color;
                    playerName = msg.playerName;
                    gameStarted = true;
                    document.getElementById("player-name").textContent = playerName;
                    const el = document.getElementById("player-color");
                    const cls = myColor === "red" ? "red" : "blue";
                    el.innerHTML = '&middot; <span class="' + cls + '">' + myColor + '</span>';
                    document.getElementById("waiting").style.display = "none";
                    document.getElementById("turn").style.display = "";
                    updateTurn();
                    return;
                }

                if (msg.opponent_disconnected) {
                    document.getElementById("waiting").textContent = "Opponent disconnected — waiting for reconnect...";
                    document.getElementById("waiting").style.display = "";
                    return;
                }

                if (msg.opponent_reconnected) {
                    document.getElementById("waiting").style.display = "none";
                    return;
                }

                if (msg.error) {
                    document.getElementById("waiting").textContent = msg.error === "room_full" ? "Room is full" : msg.error;
                    return;
                }

                if (msg.winner) {
                    gameOver = true;
                    document.getElementById("turn").style.display = "none";

                    // pulse winning color cells
                    document.querySelectorAll(".hex-cell." + msg.winner).forEach(c => {
                        c.classList.add("win-pulse");
                    });

                    // show banner after pulse
                    setTimeout(() => {
                        const el = document.getElementById("winner");
                        const color = msg.winner === "red" ? "#e25555" : "#4488cc";
                        el.innerHTML = '<span style="color:' + color + '">' + msg.winner + ' wins!</span>';
                        el.style.display = "block";
                    }, 600);
                    return;
                }

            };
        }

        buildBoard();
        sessionID = localStorage.getItem("hex_session_" + roomName);
        connect();
    </script>
</body>
</html>
