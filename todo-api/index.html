<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #111;
            color: #e0e0e0;
            font-family: -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            padding: 60px 20px;
        }
        .container { width: 100%; max-width: 500px; }
        h1 { font-size: 1.4rem; margin-bottom: 24px; font-weight: 500; }
        .add-form {
            display: flex;
            gap: 8px;
            margin-bottom: 32px;
        }
        input {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #e0e0e0;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 0.95rem;
            outline: none;
        }
        input:focus { border-color: #555; }
        button {
            background: #2a2a2a;
            color: #e0e0e0;
            border: 1px solid #333;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95rem;
        }
        button:hover { background: #333; }
        .todo-list { list-style: none; }
        .todo-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #1e1e1e;
            gap: 12px;
        }
        .todo-item .check {
            width: 20px;
            height: 20px;
            border: 2px solid #444;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .todo-item .check.done {
            background: #4a9eff;
            border-color: #4a9eff;
        }
        .todo-item .check.done::after {
            content: "\2713";
            color: #111;
            font-size: 14px;
            font-weight: bold;
        }
        .todo-item .text { flex: 1; }
        .todo-item .text.done { text-decoration: line-through; color: #555; }
        .todo-item .delete {
            background: none;
            border: none;
            color: #555;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 0 4px;
        }
        .todo-item .delete:hover { color: #e55; }
        .empty { color: #555; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Todo</h1>
        <div class="add-form">
            <input type="text" id="input" placeholder="Add a task..." autofocus>
            <button onclick="addTodo()">Add</button>
        </div>
        <ul class="todo-list" id="list"></ul>
    </div>
    <script>
        const API = "/todo";

        async function loadTodos() {
            const res = await fetch(API);
            const todos = await res.json();
            const list = document.getElementById("list");

            if (!todos || todos.length === 0) {
                list.innerHTML = '<li class="empty">No tasks yet.</li>';
                return;
            }

            list.innerHTML = todos.map((todo, i) => `
                <li class="todo-item">
                    <div class="check ${todo.Done ? 'done' : ''}" onclick="toggleTodo(${i}, ${!todo.Done})"></div>
                    <span class="text ${todo.Done ? 'done' : ''}">${todo.Text}</span>
                    <button class="delete" onclick="deleteTodo(${i})">&times;</button>
                </li>
            `).join("");
        }

        async function addTodo() {
            const input = document.getElementById("input");
            const text = input.value.trim();
            if (!text) return;

            await fetch(API, {
                method: "POST",
                body: JSON.stringify({ text: text })
            });
            input.value = "";
            loadTodos();
        }

        async function toggleTodo(index, mark) {
            await fetch(API, {
                method: "PUT",
                body: JSON.stringify({ index: String(index), mark: String(mark) })
            });
            loadTodos();
        }

        async function deleteTodo(index) {
            await fetch(API, {
                method: "DELETE",
                body: JSON.stringify({ index: index })
            });
            loadTodos();
        }

        document.getElementById("input").addEventListener("keydown", (e) => {
            if (e.key === "Enter") addTodo();
        });

        loadTodos();
    </script>
</body>
</html>
