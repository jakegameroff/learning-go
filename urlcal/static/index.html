<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>urlcal</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: -apple-system, sans-serif;
            margin: 0;
            color: #333;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav a {
            font-family: 'Roboto Mono', monospace;
            font-size: 0.95rem;
            font-weight: 500;
            color: #333;
            text-decoration: none;
        }
        .nav-right { display: flex; gap: 4px; align-items: center; }
        .nav-btn {
            background: none;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 24px;
            height: 24px;
            padding: 0;
            cursor: pointer;
            font-size: 0.8rem;
            color: #666;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .nav-btn:hover { border-color: #333; color: #333; }
        .tooltip {
            display: none;
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 6px;
            padding: 12px 14px;
            width: 220px;
            font-size: 0.8rem;
            color: #555;
            line-height: 1.5;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            text-align: left;
        }
        .nav-btn:hover .tooltip { display: block; }
        .tooltip b { font-family: 'Roboto Mono', monospace; font-size: 0.75rem; color: #333; }
        .hero {
            text-align: left;
        }
        h1 {
            font-family: 'Roboto Mono', monospace;
            font-size: 1.8rem;
            font-weight: 500;
            margin: 0 0 6px;
        }
        .sub {
            color: #888;
            font-size: 0.9rem;
            margin: 0 0 20px;
        }
        form { display: flex; gap: 0; }
        .prefix {
            font-family: 'Roboto Mono', monospace;
            font-size: 0.85rem;
            color: #999;
            padding: 8px 0 8px 10px;
            border: 1px solid #ccc;
            border-right: none;
            border-radius: 4px 0 0 4px;
            background: inherit;
        }
        input {
            font-family: 'Roboto Mono', monospace;
            font-size: 0.85rem;
            padding: 8px;
            border: 1px solid #ccc;
            border-left: none;
            border-radius: 0 4px 4px 0;
            outline: none;
            width: 160px;
            color: inherit;
            background: inherit;
        }
        .btn {
            font-family: inherit;
            font-size: 0.8rem;
            padding: 8px 16px;
            margin-left: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: none;
            color: inherit;
            cursor: pointer;
        }
        .btn:hover { border-color: #333; }

        .dark { background: #111; color: #e0e0e0; }
        .dark nav a { color: #e0e0e0; }
        .dark .nav-btn { border-color: #444; color: #888; }
        .dark .nav-btn:hover { border-color: #aaa; color: #aaa; }
        .dark .tooltip { background: #1a1a1a; border-color: #333; color: #aaa; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        .dark .tooltip b { color: #e0e0e0; }
        .dark input, .dark .prefix { border-color: #333; }
        .dark .btn { border-color: #444; }
        .dark .btn:hover { border-color: #aaa; }
    </style>
</head>
<body>
    <nav>
        <a href="/">urlcal</a>
        <div class="nav-right">
            <button class="nav-btn">?
                <div class="tooltip">
                    <b>urlcal.com/anything</b> → claim it with a password → add events, color-code them, plan your week. Share the URL with or without the password.
                </div>
            </button>
            <button class="nav-btn" id="toggle" onclick="toggleTheme()">
                <svg id="icon-moon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                <svg id="icon-sun" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            </button>
        </div>
    </nav>
    <div class="hero">
        <h1>Private Calendar URLs</h1>
        <p class="sub">Claim your calendar URL</p>
        <form onsubmit="go(event)">
            <span class="prefix">urlcal.com/</span>
            <input type="text" id="name" placeholder="my-calendar" required autofocus oninput="this.value=this.value.toLowerCase().replace(/[^a-z0-9-]/g,'')">
            <button class="btn" type="submit">go</button>
        </form>
    </div>
    <script>
        function go(e) {
            e.preventDefault();
            const n = document.getElementById('name').value.trim().toLowerCase().replace(/[^a-z0-9-]/g, '');
            if (n) window.location.href = '/' + n;
        }
        function setThemeIcons(dark) {
            document.getElementById('icon-moon').style.display = dark ? 'none' : 'block';
            document.getElementById('icon-sun').style.display = dark ? 'block' : 'none';
        }
        function toggleTheme() {
            const dark = document.body.classList.toggle('dark');
            setThemeIcons(dark);
            localStorage.setItem('theme', dark ? 'dark' : 'light');
        }
        const saved = localStorage.getItem('theme') ||
            (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        if (saved === 'dark') {
            document.body.classList.add('dark');
            setThemeIcons(true);
        }
    </script>
</body>
</html>
